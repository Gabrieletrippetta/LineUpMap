<!DOCTYPE html>
<html>
<head>
    <title>Verifica Data Variables</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .section { background: white; padding: 15px; margin: 15px 0; border-left: 4px solid #007bff; }
        .found { color: green; font-weight: bold; }
        .missing { color: red; }
        .count { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🔍 Verifica Data Variables nel Database</h1>
    <button onclick="checkDataVariables()">▶️ Verifica</button>
    <div id="results"></div>

    <script>
        const expectedFields = {
            "Students' Information": [
                "Student Gender",
                "Student Age",
                "Student Citizenship",
                "Student Foreign Birth Country",
                "Student Specific Birth Country",
                "Student Town of Residence",
                "Student Province of Residence",
                "Student Region of Residence",
                "Student Belonging to a Recognized Ethnic Minority",
                "Student ECEC Attendance",
                "Student Previous Grade Retention",
                "Student Learning Impairments",
                "Student Physical Impairments",
                "Student School Attitude or Motivation",
                "Student Assigned Teacher Grades",
                "Student Allowance/Scholarship"
            ],
            "Household's Information": [
                "Number of Parents",
                "Presence of Stepparents",
                "Siblings",
                "Parental Working Status",
                "Parental Occupation",
                "Parental Education",
                "Parental Education Level (ISCED)",
                "Parental Migratory Background",
                "Parents Age",
                "Parents Place of Birth",
                "Parental Income or Wealth",
                "Parental Host Country's Language Proficiency",
                "Number of Books",
                "Number of Digital Devices",
                "Ownership of the Apartment/House"
            ],
            "Teachers' Information": [
                "Teacher Age",
                "Teacher Gender",
                "Teacher Seniority",
                "Teacher Educational Degree",
                "Teacher Contract Type"
            ],
            "School/Class Information": [
                "School Geo Referencing",
                "School Type",
                "School Track",
                "School Size",
                "Class Size",
                "School Composition",
                "Class Composition"
            ]
        };

        async function checkDataVariables() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>⏳ Caricamento dati...</p>';

            try {
                const response = await fetch('http://localhost:5000/api/datasets');
                const data = await response.json();

                if (!data.success) {
                    throw new Error('API error');
                }

                const datasets = data.data;
                
                // Raccogli tutti i campi disponibili
                const allFields = new Set();
                datasets.forEach(dataset => {
                    Object.keys(dataset).forEach(key => allFields.add(key));
                });

                console.log('📋 Campi disponibili nel database:', Array.from(allFields).sort());

                let html = `<h2>✅ Caricati ${datasets.length} dataset</h2>`;
                html += `<p><strong>Campi totali disponibili:</strong> ${allFields.size}</p>`;

                let totalExpected = 0;
                let totalFound = 0;
                let totalMissing = 0;

                Object.entries(expectedFields).forEach(([category, fields]) => {
                    html += `<div class="section">`;
                    html += `<h3>${category}</h3>`;
                    
                    const found = [];
                    const missing = [];

                    fields.forEach(field => {
                        totalExpected++;
                        if (allFields.has(field)) {
                            found.push(field);
                            totalFound++;
                        } else {
                            missing.push(field);
                            totalMissing++;
                        }
                    });

                    html += `<p><strong>Trovati:</strong> <span class="found">${found.length}</span> / ${fields.length}</p>`;
                    
                    if (found.length > 0) {
                        html += `<details><summary>✅ Campi trovati (${found.length})</summary><ul>`;
                        found.forEach(f => html += `<li class="found">${f}</li>`);
                        html += `</ul></details>`;
                    }
                    
                    if (missing.length > 0) {
                        html += `<details open><summary>❌ Campi mancanti (${missing.length})</summary><ul>`;
                        missing.forEach(f => html += `<li class="missing">${f}</li>`);
                        html += `</ul></details>`;
                    }

                    html += `</div>`;
                });

                html += `<div class="section" style="border-left-color: #28a745;">`;
                html += `<h3>📊 Riepilogo Totale</h3>`;
                html += `<p><strong>Campi attesi:</strong> ${totalExpected}</p>`;
                html += `<p><strong>Campi trovati:</strong> <span class="found">${totalFound}</span></p>`;
                html += `<p><strong>Campi mancanti:</strong> <span class="missing">${totalMissing}</span></p>`;
                html += `<p><strong>Percentuale:</strong> ${Math.round(totalFound / totalExpected * 100)}%</p>`;
                html += `</div>`;

                if (totalMissing === totalExpected) {
                    html += `<div class="section" style="border-left-color: #dc3545; background: #fff3cd;">`;
                    html += `<h3>⚠️ PROBLEMA: Tutti i campi sono mancanti!</h3>`;
                    html += `<p>Questo significa che il database <strong>NON contiene</strong> i campi "Data Variables".</p>`;
                    html += `<p><strong>Possibili cause:</strong></p>`;
                    html += `<ol>`;
                    html += `<li>Il database non è stato popolato con questi campi</li>`;
                    html += `<li>I nomi dei campi nel database sono diversi</li>`;
                    html += `<li>app.py non sta trasformando questi campi</li>`;
                    html += `</ol>`;
                    html += `<p><strong>Soluzione:</strong></p>`;
                    html += `<ol>`;
                    html += `<li>Verifica se questi campi esistono nel database originale</li>`;
                    html += `<li>Se esistono ma con nomi diversi, aggiorna app.py per mapparli</li>`;
                    html += `<li>Se non esistono, rimuovi la sezione "Data Variables" dal frontend</li>`;
                    html += `</ol>`;
                    html += `</div>`;
                }

                // Mostra alcuni campi che potrebbero essere correlati
                const relatedFields = Array.from(allFields).filter(f => 
                    f.toLowerCase().includes('student') || 
                    f.toLowerCase().includes('teacher') || 
                    f.toLowerCase().includes('parent') ||
                    f.toLowerCase().includes('school') ||
                    f.toLowerCase().includes('class')
                );

                if (relatedFields.length > 0) {
                    html += `<div class="section">`;
                    html += `<h3>🔍 Campi correlati trovati nel database</h3>`;
                    html += `<p>Questi campi potrebbero essere correlati alle Data Variables:</p>`;
                    html += `<ul>`;
                    relatedFields.forEach(f => html += `<li>${f}</li>`);
                    html += `</ul>`;
                    html += `</div>`;
                }

                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;">❌ Errore: ${error.message}</p>`;
            }
        }

        // Auto-run
        window.onload = checkDataVariables;
    </script>
</body>
</html>
