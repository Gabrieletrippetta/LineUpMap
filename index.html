<!DOCTYPE html>
<html>
<head>
    <title>LINEup School Data Explorer - An Open-Source Map to Longitudinal Databases in Europe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <h1>LINEup School Data Explorer - An Open-Source Map to Longitudinal Databases in Europe</h1>

    <button id="auth-container">Register/Login</button>
    <!-- <a href="/auth.html" class="register-login">Register/Login</a> -->
    
    <div id="user-info" style="display: none;">
        <p>Welcome, <span id="user-name"></span>!</p>
        <button id="logout-btn">Logout</button>
    </div>    

    <div id="advanced-tools" style="display:none;">
        <h2>Advanced Researcher Tools</h2>
        <p>Access metadata, filtering options, and raw dataset links.</p>
    </div>
    

    <!-- Search and Filtering UI -->
    <div class="filter-container">
        <input type="text" id="searchInput" placeholder="Search...">
        
        <select id="filterCountry">
            <option value="all">Select all</option>
        </select>
        
        <select id="filterEducation">
            <option value="">School education</option>
            <option value="ISCED 1">ISCED 1</option>
            <option value="ISCED 2">ISCED 2</option>
            <option value="ISCED 3">ISCED 3</option>
        </select>
        
        <select id="filterDataAvailability">
            <option value="">Data availability</option>
            <option value="Open">Open</option>
            <option value="Restricted">Restricted</option>
            <option value="Request">On Request</option>
        </select>
        
        <button onclick="searchData()">Search</button>
        
        <!-- Aggiungi accanto alla barra di ricerca -->
        <input type="file" id="fileInput" accept=".xlsx" multiple>
        <button onclick="uploadFiles()">Upload Files</button>
    </div>


    
    <div id="map"></div>
    <script src="assets/script.js"></script>
    <script>
        var _paq = window._paq || [];
        _paq.push(["trackPageView"]);
        _paq.push(["enableLinkTracking"]);
        (function() {
            var u="https://your-matomo-instance.com/";
            _paq.push(["setTrackerUrl", u+"matomo.php"]);
            _paq.push(["setSiteId", "1"]);
            var d=document, g=d.createElement("script"), s=d.getElementsByTagName("script")[0];
            g.async=true; g.src=u+"matomo.js"; s.parentNode.insertBefore(g,s);
        })();
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_GA_ID"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'YOUR_GA_ID');
    </script>
</body>
</html>
