<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LINEup Education Data Explorer - An Open-Source Map to Longitudinal Datasets in Europe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <!-- Linguetta verticale "Contact Us" -->
    <div id="contact-tab" class="contact-tab">HELP US IMPROVE</div>
    
    <!-- Pannello del modulo di contatto -->
    <div id="contact-panel" class="contact-panel">
        <button id="close-panel" class="close-panel">&times;</button>
        <iframe
            src="https://form.jotform.com/251081340365045"
            width="100%"
            height="100%"
            frameborder="0"
            style="border:none;">
        </iframe>
        <p class="contact-panel-description">Prefer to get in touch directly? <br> Contact us at <a href="mailto:info@lineup-project.eu">info@lineup-project.eu</a></p>
    </div>
    
    <!--! Role selection MODAL -->
    <!-- <div id="role-modal" class="modal">
        <div class="modal-content">
            <h3>Select Your Profile</h3>
            <div class="role-option">
                <button onclick="selectRole('stakeholder')">Educational Stakeholder</button>
                <p>(including policymakers, institutions, NGOs, and ministries of education) interested in accessible insights and research findings derived from longitudinal data on school education.</p>
            </div>
            <div class="role-option">
                <button onclick="selectRole('researcher')">Researcher</button>
                <p>(including data analysts) interested in the datasets themselves for deeper statistical analysis and academic studies.</p>
            </div>
        </div>
    </div> -->

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-8 p-0 d-flex flex-column" style="height: 100vh;">
                <header class="py-4 ">
                    <div class="container-fluid">
                        <div class="row align-items-center">
                            <div class="col-lg-8 text-center text-lg-start">
                                <h1 class="h4 mb-1">LINEup Education Data Explorer</h1>
                                <h2 class="h6 text-muted">An Open-Source Map to Longitudinal Datasets in Europe</h2>
                            </div>
                            <div class="col-4 text-end">
                                <div id="role-display-container">
                                    
                                    <!--! Optional: future role selection -->
                                    <!--
                                    <span id="current-role" class="ms-3" onmouseover="showRoleDescription()" onmouseout="hideRoleDescription()">Role</span>
                                    <button class="btn btn-outline-secondary ms-2" onclick="changeRole()">Change Role</button>
                                    <div id="role-description-box" style="display: none;"></div>
                                    -->
                                </div>
                            </div>
                        </div>
                    </div>
                </header>

                <div id="list-view" style="display: none;" class="container mt-3">
                    <div class="row" id="list-content"></div>
                </div>
                <div id="map"></div>
            </div>
                
            <div class="col-lg-4 p-3 bg-white" style="height: 100vh; overflow-y: auto;" id="filter-area">
                <!-- Search bar -->
                <div class="d-flex mb-3">
                    <div class="col">
                        <input type="text" id="search-input" class="form-control mb-3" placeholder="Search among 103 datasets">
                    </div>
                    <div class="col-auto">
                        <button id="toggle-view-button" class="btn btn-success" onclick="toggleView()">List View</button>
                    </div>
                </div>
                <!-- MAIN FILTERS: sempre visibili -->
                <div class="mb-4">
                    <h5>Main Filters</h5>
                    <div id="main-filter-labels" class="mb-2 main-fitler-container">
                        <!-- <div class="main-filter-label" data-filter="Country">Country</div>
                        <div class="main-filter-label" data-filter="Type of Longitudinal Data">Type of Longitudinal Data</div>
                        <div class="main-filter-label" data-filter="Data Collection Focus">Data Collection Focus</div>
                        <div class="main-filter-label" data-filter="Data Collection Purpose">Data Collection Purpose</div>
                        <div class="main-filter-label" data-filter="Data Collection Frequency">Data Collection Frequency</div>
                        <div class="main-filter-label" data-filter="Sample Level">Sample Level</div>
                        <div class="main-filter-label" data-filter="Access to Micro Data">Access to Micro Data</div> -->
                    </div>
                    <div id="main-filter-float-panel" class="mb-3">
                        <div class="filter-panel-header d-flex justify-content-between align-items-center">
                            <span id="filter-panel-title" style="display: none;">Filter Options</span>
                            <button id="close-filter-panel" style="display: none;" class="btn-close" aria-label="Close"></button>
                        </div>
                        <div id="filter-panel-content"></div>
                    </div>
                </div>

                <!-- COLLAPSIBLE FILTER GROUPS -->
                <div class="accordion" id="filterAccordion">

                <!-- Advanced Filters -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingAdvanced">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAdvanced" aria-expanded="false" aria-controls="collapseAdvanced">
                            Advanced Filters
                        </button>
                    </h2>
                    <div id="collapseAdvanced" class="accordion-collapse collapse" aria-labelledby="headingAdvanced" data-bs-parent="#filterAccordion">
                        <div class="accordion-body">
                            <label><input type="checkbox" value="Option 2A"> Option 2A</label><br>
                            <label><input type="checkbox" value="Option 2B"> Option 2B</label><br>
                            <label><input type="checkbox" value="Option 2C"> Option 2C</label><br>
                            <label><input type="checkbox" value="Option 2D"> Option 2D</label><br>
                            <label><input type="checkbox" value="Option 2E"> Option 2E</label>
                        </div>
                    </div>
                </div>

                <!-- Data Variables -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingVariables">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseVariables" aria-expanded="false" aria-controls="collapseVariables">
                            Data Variables
                        </button>
                    </h2>
                    <div id="collapseVariables" class="accordion-collapse collapse" aria-labelledby="headingVariables" data-bs-parent="#filterAccordion">
                        <div class="accordion-body">
                            <label><input type="checkbox" value="Option 3A"> Option 3A</label><br>
                            <label><input type="checkbox" value="Option 3B"> Option 3B</label><br>
                            <label><input type="checkbox" value="Option 3C"> Option 3C</label><br>
                            <label><input type="checkbox" value="Option 3D"> Option 3D</label><br>
                            <label><input type="checkbox" value="Option 3E"> Option 3E</label>
                        </div>
                    </div>
                </div>

                </div>

                <!-- Search Button -->
                <button onclick="applyFilters()" class="btn btn-success w-100 mt-4">Search</button>

            </div>
            
            
        </div>
    </div>
        
        <!-- PANNELLO SHOW ALL DATATBASES -->
        <div id="dbpanel">
            <div class="dbpanel-header">
                <h2 id="panel-country-title"></h2>
                <button onclick="closeDbPanel()">✖</button>
            </div>
            <div id="dbpanel-content"></div>
        </div>
        
        <!-- PANNELLO CON INFORMAZIONI SUI DATABASE -->
        <div id="db-modal" class="db-modal">
            <div class="db-modal-content">
                <button class="db-modal-close" onclick="closeDbModal()">✖</button>
                <h2 id="modal-country-title"></h2>
                <div id="modal-db-list"></div>
            </div>
        </div>
        
        
        
    <script src="assets/search.js"></script>
    <script src="assets/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
